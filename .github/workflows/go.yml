name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.24

    - name: Build
      run: go build -v ./...

    - name: Run Unit tests
      run: |
        # don't measure coverage on the testutil internal package which is
        # test-only. get a list of all packages, excluding the 'testutil'
        # package
        PACKAGES_TO_TEST=$(go list ./... | grep -v '/testutil')
        go test -race -covermode atomic -coverprofile=covprofile $PACKAGES_TO_TEST

    - name: Install goveralls
      run: go install github.com/mattn/goveralls@latest

    - name: Send coverage
      env:
        COVERALLS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: goveralls -coverprofile=covprofile -service=github

